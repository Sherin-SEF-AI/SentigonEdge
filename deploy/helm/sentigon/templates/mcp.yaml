{{- if .Values.mcp.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-mcp
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-mcp
    app.kubernetes.io/component: mcp
    {{- include "sentigon.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.mcp.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Release.Name }}-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Release.Name }}-mcp
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: mcp
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python", "-m", "{{ .Values.mcp.module }}"]
          ports:
            - name: http
              containerPort: {{ .Values.mcp.port }}
          env:
            - name: FASTMCP_PORT
              value: {{ .Values.mcp.port | quote }}
          envFrom:
            {{- include "sentigon.envFrom" . | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-mcp
  labels:
    app.kubernetes.io/name: {{ .Release.Name }}-mcp
    {{- include "sentigon.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ .Release.Name }}-mcp
  ports:
    - name: http
      port: {{ .Values.mcp.port }}
      targetPort: http
{{- end }}
