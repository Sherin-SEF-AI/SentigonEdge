# Real internet media sources, restreamed as live RTSP cameras through MediaMTX.
# This is the permitted hardware substitution (a real video feed over the real RTSP
# path stands in for a camera device). Everything after RTSP ingress stays real:
# real frames, real YOLO26 inference, real tracks, real events. No fabricated data.
#
# Sources are real, publicly available, appropriately licensed surveillance-style
# footage of public/monitored spaces (Intel IoT devkit sample-videos, Apache-2.0).
# type: file (loop with correct timestamps) | hls | rtsp (live relay + reconnect).
# Each maps to a real Camera + a real Zone created through the API onboarding path.

